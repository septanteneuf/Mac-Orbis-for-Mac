<!doctype html>
<html lang="fr">

<head>
	<meta charset="utf-8">
	<title>Mac Orbis — Historique</title>

	<link rel="stylesheet" href="/assets/common.css">

	<style>
		body {
			background: #0f172a;
			color: #e5e7eb;
			font-family: system-ui, sans-serif;
			margin: 0;
		}

		.toolbar {
			display: flex;
			gap: 10px;
			padding: 15px 20px;
			background: #111827;
		}

		input,
		select {
			background: #1f2937;
			color: white;
			border: 1px solid #374151;
			border-radius: 8px;
			padding: 8px;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		th {
			background: #1f2937;
			text-align: left;
			padding: 10px;
			position: sticky;
			top: 0;
		}

		td {
			padding: 10px;
			border-bottom: 1px solid #1e293b;
		}

		tr:hover {
			background: #172554;
		}

		.badge {
			padding: 3px 8px;
			border-radius: 999px;
			background: #334155;
			font-size: 12px;
		}
	</style>
</head>

<body>

	<div id="header-container"></div>

	<script>
		fetch("/header")
			.then(r => r.text())
			.then(html => {
				document.getElementById("header-container").innerHTML = html;
				document.getElementById("nav-history")
					?.classList.add("active");
			});
	</script>

	<div class="toolbar">
		<input id="search" placeholder="Recherche...">

		<select id="serviceFilter">
			<option value="">Tous les services</option>
		</select>

		<select id="processFilter">
			<option value="">Tous les processus</option>
		</select>
	</div>

	<table>
		<thead>
			<tr>
				<th>Date</th>
				<th>Processus</th>
				<th>Service</th>
				<th>Destination</th>
				<th>Port</th>
			</tr>
		</thead>

		<tbody id="tbody">
		</tbody>
	</table>

	<script>

		let historyData = [];

		async function loadHistory() {

			const response = await fetch("/history?limit=500");
			historyData = await response.json();

			populateFilters();
			render();
		}

		function populateFilters() {

			const services =
				[...new Set(historyData.map(x => x.service))]
					.sort();

			const processes =
				[...new Set(historyData.map(x => x.process))]
					.sort();

			const serviceSelect =
				document.getElementById("serviceFilter");

			const processSelect =
				document.getElementById("processFilter");

			serviceSelect.innerHTML =
				'<option value="">Tous les services</option>';

			processSelect.innerHTML =
				'<option value="">Tous les processus</option>';

			services.forEach(service => {
				serviceSelect.innerHTML +=
					`<option>${service}</option>`;
			});

			processes.forEach(process => {
				processSelect.innerHTML +=
					`<option>${process}</option>`;
			});
		}

		function render() {

			const search =
				document.getElementById("search")
					.value
					.toLowerCase();

			const serviceFilter =
				document.getElementById("serviceFilter")
					.value;

			const processFilter =
				document.getElementById("processFilter")
					.value;

			const tbody =
				document.getElementById("tbody");

			const rows = historyData.filter(item => {

				if (serviceFilter &&
					item.service !== serviceFilter)
					return false;

				if (processFilter &&
					item.process !== processFilter)
					return false;

				const text =
					JSON.stringify(item)
						.toLowerCase();

				return text.includes(search);

			});

			tbody.innerHTML = rows.map(item => `

        <tr>
            <td>${item.timestamp}</td>

            <td>
                <span class="badge">
                ${item.process}
                </span>
            </td>

            <td>${item.service}</td>

            <td>
                ${item.remote_hostname ||
				item.remote_ip}
            </td>

            <td>${item.remote_port}</td>

        </tr>

    `).join("");

		}

		document
			.getElementById("search")
			.addEventListener("input", render);

		document
			.getElementById("serviceFilter")
			.addEventListener("change", render);

		document
			.getElementById("processFilter")
			.addEventListener("change", render);

		loadHistory();

		setInterval(loadHistory, 10000);

	</script>

</body>

</html>
