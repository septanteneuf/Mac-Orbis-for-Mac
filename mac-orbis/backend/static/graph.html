<!doctype html>
<html lang="fr">

<head>
	<meta charset="utf-8">
	<title>Mac Orbis — Graphe</title>
	<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
	<link rel="stylesheet" href="/assets/common.css">

	<style>
		body {
			margin: 0;
			background: #0f172a;
			color: #e5e7eb;
			font-family: system-ui, sans-serif;
			overflow: hidden;
		}

		.muted {
			color: #9ca3af;
			font-size: 13px;
		}

		.controls {
			margin-left: auto;
			display: flex;
			align-items: center;
			gap: 14px;
			font-size: 13px;
			color: #cbd5e1;
			flex-wrap: wrap;
		}

		.controls label {
			display: flex;
			align-items: center;
			gap: 6px;
			cursor: pointer;
		}

		button {
			background: #1f2937;
			color: #e5e7eb;
			border: 1px solid #374151;
			border-radius: 8px;
			padding: 6px 10px;
			cursor: pointer;
		}

		button:hover {
			background: #374151;
		}

		svg {
			width: 100vw;
			height: 100vh;
			display: block;
		}

		.link {
			stroke: #64748b;
			stroke-opacity: 0.65;
		}

		.node circle {
			stroke: #e5e7eb;
			stroke-width: 1.4px;
		}

		.process circle {
			fill: #60a5fa;
		}

		.destination circle {
			fill: #34d399;
		}

		.local circle {
			fill: #94a3b8;
		}

		.unknown circle {
			fill: #f59e0b;
		}

		.label {
			fill: #e5e7eb;
			font-size: 12px;
			paint-order: stroke;
			stroke: #0f172a;
			stroke-width: 4px;
			stroke-linecap: round;
			stroke-linejoin: round;
			pointer-events: none;
		}

		.count-label {
			fill: #0f172a;
			font-size: 11px;
			font-weight: 700;
			text-anchor: middle;
			dominant-baseline: central;
			pointer-events: none;
		}

		#details {
			position: fixed;
			right: 16px;
			top: 76px;
			width: 340px;
			max-height: calc(100vh - 100px);
			overflow: auto;
			background: rgba(17, 24, 39, 0.94);
			border: 1px solid #374151;
			border-radius: 12px;
			padding: 14px;
			z-index: 20;
			font-size: 13px;
			box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
		}

		#details h2 {
			margin: 0 0 8px;
			font-size: 16px;
		}

		.detail-item {
			border-top: 1px solid #374151;
			padding: 8px 0;
		}

		.detail-label {
			color: #9ca3af;
			font-size: 12px;
			word-break: break-all;
		}

		.pill {
			display: inline-block;
			padding: 2px 8px;
			border-radius: 999px;
			background: #334155;
			color: #cbd5e1;
			font-size: 12px;
			margin-top: 4px;
			margin-right: 4px;
		}

		.legend {
			position: fixed;
			left: 16px;
			bottom: 16px;
			background: rgba(17, 24, 39, 0.86);
			border: 1px solid #374151;
			border-radius: 12px;
			padding: 10px 12px;
			font-size: 12px;
			color: #cbd5e1;
			z-index: 20;
		}

		.legend-row {
			display: flex;
			align-items: center;
			gap: 8px;
			margin: 4px 0;
		}

		.dot {
			width: 11px;
			height: 11px;
			border-radius: 999px;
			display: inline-block;
		}

		.dot.process {
			background: #60a5fa;
		}

		.dot.destination {
			background: #34d399;
		}

		.dot.local {
			background: #94a3b8;
		}

		.dot.unknown {
			background: #f59e0b;
		}
	</style>
</head>

<body>
	<div id="header-container"></div>

	<script>
		fetch("/header")
			.then(r => r.text())
			.then(html => {
				document.getElementById("header-container").innerHTML = html;
				document.getElementById("nav-graph")
					?.classList.add("active");
			});
	</script>

	<svg></svg>

	<div id="details">
		<h2>Détails</h2>
		<p class="muted">Clique sur un nœud pour voir les connexions associées.</p>
	</div>

	<div class="legend">
		<div class="legend-row"><span class="dot process"></span> Processus</div>
		<div class="legend-row"><span class="dot destination"></span> Destination connue</div>
		<div class="legend-row"><span class="dot unknown"></span> Destination inconnue</div>
		<div class="legend-row"><span class="dot local"></span> Local</div>
	</div>

	<script>
		const svg = d3.select("svg");
		const width = window.innerWidth;
		const height = window.innerHeight;

		const container = svg.append("g");
		const linksLayer = container.append("g");
		const nodesLayer = container.append("g");

		const zoom = d3.zoom().on("zoom", (event) => {
			container.attr("transform", event.transform);
		});

		svg.call(zoom);

		const resetZoomButton = document.getElementById("resetZoom");
		if (resetZoomButton) {
			resetZoomButton.addEventListener("click", () => {
				svg.transition().duration(300).call(zoom.transform, d3.zoomIdentity);
			});
		}

		const showLocalCheckbox = document.getElementById("showLocal");
		if (showLocalCheckbox) {
			showLocalCheckbox.addEventListener("change", refresh);
		}

		const groupByServiceCheckbox = document.getElementById("groupByService");
		if (groupByServiceCheckbox) {
			groupByServiceCheckbox.addEventListener("change", refresh);
		}

		let currentNodes = [];
		let currentLinks = [];
		let latestConnections = [];

		const simulation = d3.forceSimulation()
			.force("link", d3.forceLink().id(d => d.id).distance(110).strength(0.7))
			.force("charge", d3.forceManyBody().strength(-230))
			.force("center", d3.forceCenter(width / 2, height / 2 + 30))
			.force("x", d3.forceX(width / 2).strength(0.045))
			.force("y", d3.forceY(height / 2 + 30).strength(0.045))
			.force("collision", d3.forceCollide().radius(d => Math.max(42, d.radius + 22)));

		function normalizeProcessName(name) {
			return String(name || "").replaceAll("\\x20", " ");
		}

		function destinationLabel(c) {
			const groupByServiceElement = document.getElementById("groupByService");
			const groupByService = groupByServiceElement ? groupByServiceElement.checked : true;
			const flag = c.country ? countryFlag(c.country) + " " : "";

			if (groupByService && c.service && c.service !== "Inconnu") {
				return `${flag}${c.service}`;
			}

			return `${flag}${c.remote_hostname || c.remote_ip || "Destination inconnue"}`;
		}

		function destinationType(c) {
			if (c.is_local) return "local";
			if (!c.remote_hostname && (!c.service || c.service === "Inconnu")) return "unknown";
			return "destination";
		}

		function radiusFromCount(count, type) {
			if (type === "process") {
				return Math.min(46, 16 + Math.sqrt(count) * 7);
			}

			if (type === "destination") {
				return Math.min(36, 12 + Math.sqrt(count) * 5.5);
			}

			if (type === "unknown") {
				return Math.min(34, 12 + Math.sqrt(count) * 5);
			}

			if (type === "local") {
				return Math.min(30, 11 + Math.sqrt(count) * 4);
			}

			return 14;
		}

		async function refresh() {
			const res = await fetch("/connections?ts=" + Date.now());
			let connections = await res.json();

			const showLocalElement = document.getElementById("showLocal");
			const showLocal = showLocalElement ? showLocalElement.checked : false;

			connections = connections.filter(c => showLocal || !c.is_local);
			latestConnections = connections;

			const nodesMap = new Map();
			const linksMap = new Map();

			for (const c of connections) {
				c.process = normalizeProcessName(c.process);

				const processId = `process:${c.process}:${c.pid}`;
				const destLabel = destinationLabel(c);
				const destType = destinationType(c);
				const destinationId = `destination:${destLabel}`;

				if (!nodesMap.has(processId)) {
					nodesMap.set(processId, {
						id: processId,
						label: `${c.process} (${c.pid})`,
						shortLabel: c.process,
						type: "process",
						count: 0,
						connections: []
					});
				}

				if (!nodesMap.has(destinationId)) {
					nodesMap.set(destinationId, {
						id: destinationId,
						label: destLabel,
						shortLabel: destLabel,
						type: destType,
						count: 0,
						connections: []
					});
				}

				const processNode = nodesMap.get(processId);
				const destinationNode = nodesMap.get(destinationId);

				processNode.count += 1;
				destinationNode.count += 1;
				processNode.connections.push(c);
				destinationNode.connections.push(c);

				const linkId = `${processId}->${destinationId}`;

				if (!linksMap.has(linkId)) {
					linksMap.set(linkId, {
						id: linkId,
						source: processId,
						target: destinationId,
						count: 0,
						ports: new Set()
					});
				}

				const link = linksMap.get(linkId);
				link.count += 1;

				if (c.remote_port) {
					link.ports.add(c.remote_port);
				}
			}

			const newNodes = Array.from(nodesMap.values()).map(node => ({
				...node,
				radius: radiusFromCount(node.count, node.type)
			}));

			const newLinks = Array.from(linksMap.values()).map(link => ({
				...link,
				ports: Array.from(link.ports)
			}));

			const oldNodeById = new Map(currentNodes.map(d => [d.id, d]));

			for (const node of newNodes) {
				const old = oldNodeById.get(node.id);
				if (old) {
					node.x = old.x;
					node.y = old.y;
					node.vx = old.vx;
					node.vy = old.vy;
					node.fx = old.fx;
					node.fy = old.fy;
				}
			}

			currentNodes = newNodes;
			currentLinks = newLinks;

			updateGraph();
			updateStatus();
		}

		function updateGraph() {
			linksLayer
				.selectAll("line")
				.data(currentLinks, d => d.id)
				.join(
					enter => enter.append("line").attr("class", "link"),
					update => update,
					exit => exit.remove()
				)
				.attr("stroke-width", d => Math.min(8, 1.2 + d.count));

			const node = nodesLayer
				.selectAll("g")
				.data(currentNodes, d => d.id)
				.join(
					enter => {
						const g = enter.append("g")
							.attr("class", d => `node ${d.type}`)
							.call(drag(simulation))
							.on("click", (event, d) => showDetails(d));

						g.append("circle");
						g.append("text").attr("class", "count-label");
						g.append("text").attr("class", "label").attr("y", 4);

						return g;
					},
					update => update.attr("class", d => `node ${d.type}`),
					exit => exit.remove()
				);

			node.select("circle")
				.attr("r", d => d.radius);

			node.select(".count-label")
				.text(d => d.count > 1 ? d.count : "");

			node.select(".label")
				.attr("x", d => d.radius + 8)
				.text(d => d.shortLabel);

			simulation.nodes(currentNodes).on("tick", () => {
				linksLayer.selectAll("line")
					.attr("x1", d => d.source.x)
					.attr("y1", d => d.source.y)
					.attr("x2", d => d.target.x)
					.attr("y2", d => d.target.y);

				nodesLayer.selectAll("g")
					.attr("transform", d => `translate(${d.x},${d.y})`);
			});

			simulation.force("link").links(currentLinks);
			simulation.alpha(0.35).restart();
		}

		function countryFlag(country) {
			const flags = {
				"Suisse": "🇨🇭",
				"France": "🇫🇷",
				"États-Unis": "🇺🇸",
				"Pays-Bas": "🇳🇱",
				"Allemagne": "🇩🇪",
				"Irlande": "🇮🇪",
				"Royaume-Uni": "🇬🇧",
				"Belgique": "🇧🇪",
				"Italie": "🇮🇹",
				"Espagne": "🇪🇸",
				"Autriche": "🇦🇹",
				"Canada": "🇨🇦",
				"Japon": "🇯🇵",
				"Chine": "🇨🇳"
			};

			return flags[country] || "🌍";
		}

		function updateStatus() {
			const processCount = currentNodes.filter(n => n.type === "process").length;
			const destinationCount = currentNodes.filter(n => n.type !== "process").length;
			const connectionCount = latestConnections.length;

			document.getElementById("status").textContent =
				`${connectionCount} connexion(s), ${processCount} processus, ${destinationCount} destination(s)`;
		}

		function showDetails(node) {
			const details = document.getElementById("details");
			const connections = node.connections || [];

			const ports = Array.from(new Set(connections.map(c => c.remote_port).filter(Boolean))).sort();
			const services = Array.from(new Set(connections.map(c => c.service || "Inconnu"))).sort();
			const countries = Array.from(
				new Set(connections.map(c => c.country ? `${countryFlag(c.country)} ${c.country}` : "Inconnu"))
			).sort();

			details.innerHTML = `
        <h2>${node.shortLabel}</h2>
        <p class="muted">${connections.length} connexion(s) active(s)</p>
        <div class="pill">Ports : ${ports.length ? ports.join(", ") : "—"}</div>
        <div class="pill">Services : ${services.join(", ")}</div>
		<div class="pill">Pays : ${countries.join(", ")}</div>

        ${connections.map(c => `
          <div class="detail-item">
            <div><strong>${c.process}</strong> → <strong>${c.remote_hostname || c.remote_ip}</strong></div>
            <div class="detail-label">Service : ${c.service || "Inconnu"}</div>
            <div class="detail-label">IP distante : ${c.remote_ip}</div>
            <div class="detail-label">Port distant : ${c.remote_port || "—"}</div>
            <div class="detail-label">IP locale : ${c.local_ip}:${c.local_port || ""}</div>
            <div class="detail-label">Type : ${c.is_local ? "Local" : "Internet"}</div>
          </div>
        `).join("")}
      `;
		}

		function drag(simulation) {
			function dragstarted(event, d) {
				if (!event.active) simulation.alphaTarget(0.25).restart();
				d.fx = d.x;
				d.fy = d.y;
			}

			function dragged(event, d) {
				d.fx = event.x;
				d.fy = event.y;
			}

			function dragended(event, d) {
				if (!event.active) simulation.alphaTarget(0);
				d.fx = null;
				d.fy = null;
			}

			return d3.drag()
				.on("start", dragstarted)
				.on("drag", dragged)
				.on("end", dragended);
		}

		refresh();
		setInterval(refresh, 3000);
	</script>
</body>

</html>
